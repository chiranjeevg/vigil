<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#020617" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigil — Autonomous Code Improvement</title>
    <script>
      (function () {
        try {
          var v = localStorage.getItem("vigil-theme");
          var dark = true;
          if (v === "light") dark = false;
          else if (v === "dark") dark = true;
          else if (v === "auto")
            dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          else dark = true;
          if (dark) document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute("content", dark ? "#020617" : "#f8fafc");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
